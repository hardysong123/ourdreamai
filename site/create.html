      <main class="lg:ml-[220px] pt-12 sm:pt-14 lg:pt-[60px] min-h-screen pb-16 lg:pb-0">
        <div class="w-full max-w-3xl mx-auto px-4 sm:px-6 py-8">
          <header class="mb-6">
            <h1 class="text-2xl sm:text-3xl font-bold text-white">Create Your AI Character</h1>
            <p class="text-gray-400 mt-2">Design your perfect AI companion step by step.</p>
          </header>
          <section class="bg-[#0d0d0d] border border-[#2a2a2a] rounded-2xl p-4 sm:p-6 space-y-5">
            <div class="grid sm:grid-cols-2 gap-4">
              <label class="space-y-2">
                <span class="text-sm text-gray-300 font-medium">Character Name <span class="text-pink-500">*</span></span>
                <input class="w-full bg-[#141414] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white placeholder-gray-500 outline-none" placeholder="e.g., Luna, Alex, Sophia..." />
              </label>
              <label class="space-y-2">
                <span class="text-sm text-gray-300 font-medium">Age <span class="text-pink-500">*</span></span>
                <input class="w-full bg-[#141414] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white placeholder-gray-500 outline-none" placeholder="e.g., 21, 25, 30..." />
              </label>
            </div>
            <label class="space-y-2 block">
              <span class="text-sm text-gray-300 font-medium">First Message / Greeting</span>
              <textarea rows="4" class="w-full bg-[#141414] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white placeholder-gray-500 outline-none" placeholder="How should your character greet users?"></textarea>
              <p class="text-xs text-gray-500">This greeting will be the first message users see when starting a chat.</p>
            </label>
            <button class="w-full h-12 rounded-xl bg-pink-600 hover:bg-pink-500 text-white font-semibold transition-colors" type="button">Continue</button>
          </section>
        </div>
