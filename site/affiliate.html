<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upgrade &amp; Affiliate | OurDream.ai</title>
    <meta name="description" content="Upgrade your plan and explore affiliate options for OurDream.ai." />
    <meta name="keywords" content="upgrade, subscription, affiliate, OurDream" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/extra.css" />
    <script src="./assets/js/main.js" defer></script>
  </head>
  <body class="bg-[#0a0a0a] text-white">
    <main class="min-h-screen px-6 py-10">
      <div class="max-w-4xl mx-auto">
        <header class="mb-6">
          <h1 class="text-3xl font-bold text-white">Upgrade</h1>
          <p class="text-gray-400 mt-2">Unlock premium features and faster access.</p>
        </header>
        <section class="grid md:grid-cols-3 gap-4">
          <article class="bg-[#0d0d0d] border border-[#2a2a2a] rounded-2xl p-6">
            <h2 class="text-lg font-semibold text-white">Free</h2>
            <p class="text-gray-400 text-sm mt-2">Basic access.</p>
            <div class="mt-4 text-2xl font-bold">$0</div>
            <button class="mt-5 w-full h-11 rounded-xl border border-[#2a2a2a] hover:bg-[#1a1a1a] text-gray-200 transition-colors" type="button">Current</button>
          </article>
          <article class="bg-[#0d0d0d] border border-pink-500/40 rounded-2xl p-6 shadow-lg shadow-pink-500/10">
            <h2 class="text-lg font-semibold text-white">Plus</h2>
            <p class="text-gray-400 text-sm mt-2">More messages, more speed.</p>
            <div class="mt-4 text-2xl font-bold">$9.99</div>
            <button class="mt-5 w-full h-11 rounded-xl bg-pink-600 hover:bg-pink-500 text-white font-semibold transition-colors" type="button">Upgrade</button>
          </article>
          <article class="bg-[#0d0d0d] border border-[#2a2a2a] rounded-2xl p-6">
            <h2 class="text-lg font-semibold text-white">Pro</h2>
            <p class="text-gray-400 text-sm mt-2">Maximum access.</p>
            <div class="mt-4 text-2xl font-bold">$19.99</div>
            <button class="mt-5 w-full h-11 rounded-xl border border-[#2a2a2a] hover:bg-[#1a1a1a] text-gray-200 transition-colors" type="button">Choose</button>
          </article>
        </section>
        <section class="mt-10">
          <h2 class="text-xl font-semibold text-white">Affiliate</h2>
          <p class="text-gray-400 text-sm mt-2">Share and earn. Use your affiliate link to invite new users.</p>
          <div class="mt-4 bg-[#0d0d0d] border border-[#2a2a2a] rounded-2xl p-5">
            <label class="block text-sm text-gray-300 font-medium mb-2">Your affiliate link</label>
            <div class="flex gap-2">
              <input class="flex-1 bg-[#141414] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white placeholder-gray-500 outline-none" value="https://example.com/?ref=yourname" readonly />
              <button class="h-12 px-4 rounded-xl bg-[#141414] border border-[#2a2a2a] hover:bg-[#1a1a1a] text-gray-200 transition-colors" type="button">Copy</button>
            </div>
          </div>
        </section>
        <footer class="mt-10">
          <a class="text-sm text-gray-400 hover:text-white" href="./index.html">Back to Explore</a>
        </footer>
      </div>
    </main>
  </body>
</html>
