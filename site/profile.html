<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | OurDream.ai</title>
    <meta name="description" content="Access your profile, account preferences, and saved activity." />
    <meta name="keywords" content="profile, account, login, OurDream" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/extra.css" />
    <script src="./assets/js/main.js" defer></script>
  </head>
  <body class="bg-[#0a0a0a] text-white">
    <main class="min-h-screen flex items-center justify-center px-6">
      <section class="w-full max-w-md bg-[#0d0d0d] border border-[#2a2a2a] rounded-2xl p-6">
        <h1 class="text-2xl font-bold text-white">Profile</h1>
        <p class="text-gray-400 mt-2">Static preview page. Connect your authentication flow in your production app.</p>
        <div class="mt-6 space-y-3">
          <label class="block space-y-2">
            <span class="text-sm text-gray-300 font-medium">Email</span>
            <input class="w-full bg-[#141414] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white placeholder-gray-500 outline-none" placeholder="you@example.com" />
          </label>
          <label class="block space-y-2">
            <span class="text-sm text-gray-300 font-medium">Password</span>
            <input type="password" class="w-full bg-[#141414] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white placeholder-gray-500 outline-none" placeholder="••••••••" />
          </label>
          <button class="w-full h-12 rounded-xl bg-pink-600 hover:bg-pink-500 text-white font-semibold transition-colors" type="button">Login</button>
        </div>
        <div class="mt-6">
          <a class="text-sm text-gray-400 hover:text-white" href="./index.html">Back to Explore</a>
        </div>
      </section>
    </main>
  </body>
</html>
